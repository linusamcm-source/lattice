# Builds the `lattice` binary (with the SvelteKit UI embedded via rust-embed)
# for Linux / macOS / Windows and publishes a GitHub Release on every `v*` tag.
#
# Each matrix runner independently builds the frontend (M-3: matrix jobs do not
# share a filesystem, so `frontend/build/` must exist on every runner before
# `cargo build --release` can embed it).
#
# Security posture:
#   - Top-level `permissions: {}` denies all permissions by default.
#   - Only the `publish` job receives `contents: write` (to create the release).
#   - All actions are pinned to full 40-char commit SHAs.
#   - The only secret in use is the automatic `GITHUB_TOKEN`.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: lattice-x86_64-unknown-linux-gnu
            ext: ""
          - os: macos-latest
            artifact: lattice-aarch64-apple-darwin
            ext: ""
          - os: windows-latest
            artifact: lattice-x86_64-pc-windows-msvc.exe
            ext: ".exe"

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # ── Frontend build (M-3: must run on every matrix runner) ──────────────
      # rust-embed reads `frontend/build/` at compile time in --release builds.
      # Matrix jobs share no filesystem, so the frontend must be built here
      # before `cargo build --release` can embed it.
      - name: Set up Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # ── Rust toolchain + build ─────────────────────────────────────────────
      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # pinned stable
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release -p lattice-backend

      # ── Package ────────────────────────────────────────────────────────────
      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/release/lattice${{ matrix.ext }} ${{ matrix.artifact }}

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item "target\release\lattice${{ matrix.ext }}" "${{ matrix.artifact }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 1

  # ── Publish ───────────────────────────────────────────────────────────────
  # Runs only after all three matrix builds succeed. Downloads the three
  # platform binaries and creates (or updates) the GitHub Release for the tag.
  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: artifacts/*
          fail_on_unmatched_files: true
          generate_release_notes: true
